// =============================================================
// CONFIG — store Apps Script URL in localStorage
// =============================================================
const URL_KEY = 'gym-endpoint-url';
const getEndpoint = () => localStorage.getItem(URL_KEY) || '';
const setEndpoint = (url) => localStorage.setItem(URL_KEY, url);

// =============================================================
// API — talks to Apps Script via hidden iframe (bypasses CORB)
// =============================================================
async function apiReadHistory() {
  const url = getEndpoint();
  if (!url) throw new Error('Endpoint URL nie je nastavené.');

  return new Promise((resolve, reject) => {
    const cbName = 'gymCb' + Date.now() + Math.floor(Math.random() * 1000);
    let settled = false;

    const timeout = setTimeout(() => {
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('Timeout — Sheet neodpovedá. Skontroluj endpoint URL.'));
    }, 20000);

    function cleanup() {
      clearTimeout(timeout);
      try { delete window[cbName]; } catch (e) {}
      if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
    }

    window[cbName] = (data) => {
      if (settled) return;
      settled = true;
      cleanup();
      if (data && data.error) reject(new Error(data.error));
      else resolve(data);
    };

    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = url + (url.includes('?') ? '&' : '?')
      + 'action=history&callback=' + cbName + '&t=' + Date.now();
    iframe.onerror = () => {
      if (settled) return;
      settled = true;
      cleanup();
      reject(new Error('Nepodarilo sa pripojiť na Sheet.'));
    };
    document.body.appendChild(iframe);
  });
}

async function apiWriteSession(payload) {
  const url = getEndpoint();
  if (!url) throw new Error('Endpoint URL nie je nastavené.');

  // POST with no-cors — we don't read the response, just fire and trust
  await fetch(url, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload),
  });
  return { ok: true };
}

function SetupScreen({ onSaved }) {
  const [url, setUrl] = useState(getEndpoint());
  const [testing, setTesting] = useState(false);
  const [error, setError] = useState('');

  const handleSave = async () => {
    if (!url.trim()) { setError('Vlož Apps Script URL.'); return; }
    setEndpoint(url.trim());
    setTesting(true);
    setError('');
    try {
      await apiReadHistory();
      onSaved();
    } catch (e) {
      setError('Test zlyhal: ' + e.message + ' — skontroluj URL a deployment.');
      setTesting(false);
    }
  };

  return (
    <div style={{ padding: '32px 20px 100px' }}>
      <div style={{ marginBottom: 28 }}>
        <div style={{ fontSize: 12, letterSpacing: '0.18em', textTransform: 'uppercase', color: C.muted, marginBottom: 10 }}>Prvotné nastavenie</div>
        <h1 style={{ fontFamily: C.serif, fontSize: 36, fontWeight: 400, lineHeight: 1.1, margin: 0, letterSpacing: '-0.02em' }}>Pripoj sa<br/>na Google Sheet.</h1>
      </div>

      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16, marginBottom: 16, fontSize: 14, lineHeight: 1.6, color: C.textDim }}>
        Po nasadení Apps Script si dostal URL končiace na <code style={{ color: '#aaa', background: '#222', padding: '2px 6px', borderRadius: 4, fontSize: 12 }}>/exec</code>. Vlož ju sem.

      <button onClick={handleSave} disabled={testing} style={{
        width: '100%', background: C.accent, border: 'none', borderRadius: 10,

    (history[0]?.sets ? history[0].sets.map(s => ({ weight: s.weight ?? '', reps: s.reps ?? '', done: false })) :
      [{ weight: '', reps: '', done: false }, { weight: '', reps: '', done: false }, { weight: '', reps: '', done: false }]);

  const [sets, setSets] = useState(seed);
  const [notes, setNotes] = useState(currentEntry?.notes || '');

  const update = (idx, field, val) => { const n = [...sets]; n[idx] = { ...n[idx], [field]: val }; setSets(n); };
  const toggleDone = (idx) => { const n = [...sets]; n[idx] = { ...n[idx], done: !n[idx].done }; setSets(n); };
  const addSet = () => setSets([...sets, { weight: '', reps: '', done: false }]);
  const removeSet = (idx) => setSets(sets.filter((_, i) => i !== idx));

  const handleSave = () => {
    const cleaned = sets.filter(s => s.weight !== '' || s.reps !== '');
    onSave({ sets: cleaned, notes });

          <button onClick={handleSave} style={{ background: C.accent, border: 'none', borderRadius: 999, padding: '10px 18px', color: '#000', cursor: 'pointer', fontSize: 13, fontWeight: 600 }}>Uložiť</button>

function TrainingScreen({ trainingId, onBack, sessions, onSaveExercise, syncing }) {
  const training = TRAININGS[trainingId];
  const [openExerciseId, setOpenExerciseId] = useState(null);
  const [todayDraft, setTodayDraft] = useState({}); // entries built up for today's session

  const todayStr = new Date().toDateString();
  const todaySession = sessions.find(s => s.training === training.name && new Date(s.date).toDateString() === todayStr);

  // Build current state for this exercise: prefer in-memory draft, fall back to today's session from Sheet
  const getCurrent = (exId) => {
    if (todayDraft[exId]) return todayDraft[exId];
    if (todaySession) {
      const sets = todaySession.sets.filter(s => s.exerciseId === exId);
      if (sets.length) {
        return {
          sets: sets.sort((a, b) => a.setNum - b.setNum).map(s => ({ weight: s.weight ?? '', reps: s.reps ?? '', done: false })),
          notes: sets[0]?.notes || '',
        };
      }
    }
    return null;
  };

  // History across sessions for this exercise (newest first, excluding today)
  const getHistory = (exId) => {
    return sessions
      .filter(s => new Date(s.date).toDateString() !== todayStr)
      .map(s => {
        const sets = s.sets.filter(set => set.exerciseId === exId).sort((a, b) => a.setNum - b.setNum);
        if (!sets.length) return null;
        return { date: s.date, sets, notes: sets[0]?.notes || '' };
      })
      .filter(Boolean);
  };

  const handleSaveExercise = async (data) => {
    if (!openExerciseId) return;
    const ex = findExercise(openExerciseId);
    setTodayDraft(prev => ({ ...prev, [openExerciseId]: data }));

    // Build full payload of today's session
    const allEntries = { ...todayDraft, [openExerciseId]: data };
    await onSaveExercise(trainingId, training.name, allEntries);
  };

  const openExercise = openExerciseId ? findExercise(openExerciseId) : null;

  return (
    <div style={{ padding: '20px 20px 100px' }}>
      <Header onBack={onBack} subtitle={training.name} title={training.focus} />

      {syncing && (
        <div style={{ background: '#0a1a2a', border: '1px solid #1f3f5f', borderRadius: 10, padding: '10px 14px', marginBottom: 16, fontSize: 13, color: '#9bcdf5', display: 'flex', alignItems: 'center', gap: 10 }}>
          <span className="spinner"></span> Ukladám do Sheetu…
        </div>
      )}

      {training.blocks.map((block, bIdx) => (
        <div key={bIdx} style={{ marginBottom: 26 }}>
          <div style={{ fontSize: 11, color: C.mutedDim, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10 }}>{block.label}</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
            {block.exercises.map(ex => {
              const current = getCurrent(ex.id);
              const lastHistory = getHistory(ex.id)[0];
              const doneToday = !!current && current.sets && current.sets.length > 0;
              return (
                <button key={ex.id} onClick={() => setOpenExerciseId(ex.id)}
                  style={{
                    background: doneToday ? C.successBg : C.card,
                    border: `1px solid ${doneToday ? C.successBorder : C.border}`,
                    borderRadius: 12, padding: '14px 16px', textAlign: 'left',
                    cursor: 'pointer', color: C.text, width: '100%',
                  }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 10 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 11, color: C.mutedDim, marginBottom: 3 }}>{ex.id}</div>
                      <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 3, lineHeight: 1.3 }}>{ex.name}</div>
                      <div style={{ fontSize: 12, color: C.muted }}>{ex.target}{ex.weight ? ` · ${ex.weight}` : ''}</div>
                    </div>
                    {doneToday && <div style={{ color: C.success, fontSize: 18, lineHeight: 1, marginTop: 2 }}>✓</div>}
                  </div>
                  {lastHistory && !doneToday && (
                    <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px solid ${C.border}`, fontSize: 12, color: C.mutedDim }}>
                      Minule: {lastHistory.sets.map((s, i) => (
                        <span key={i} style={{ color: '#aaa' }}>{s.weight ? `${s.weight}×${s.reps || '?'}` : `${s.reps || '?'}`}{i < lastHistory.sets.length - 1 ? ', ' : ''}</span>
                      ))}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
        </div>
      ))}

      {openExercise && (
        <ExerciseDetail
          exercise={openExercise}
          onClose={() => setOpenExerciseId(null)}
          history={getHistory(openExercise.id)}
          currentEntry={getCurrent(openExercise.id)}
          onSave={handleSaveExercise}
        />
      )}
    </div>
  );
}

function MiniChart({ data, height = 80, color = '#fff' }) {
  if (!data || data.length < 2) {
    return <div style={{ height, display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.mutedDim, fontSize: 11 }}>Potrebujem aspoň 2 záznamy</div>;
  }
  const w = 280, h = height;
  const values = data.map(d => d.value);
  const min = Math.min(...values), max = Math.max(...values), range = max - min || 1;
  const step = w / (data.length - 1);
  const points = data.map((d, i) => `${i * step},${h - 10 - ((d.value - min) / range) * (h - 20)}`).join(' ');
  const last = values[values.length - 1], prev = values[values.length - 2], diff = last - prev;
  const trendColor = diff > 0 ? C.success : diff < 0 ? '#b85f5f' : C.muted;
  const trendSym = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
  return (
    <div>
      <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height }}>
        <polyline fill="none" stroke={color} strokeWidth="1.5" points={points} />
        {data.map((d, i) => <circle key={i} cx={i * step} cy={h - 10 - ((d.value - min) / range) * (h - 20)} r="2.5" fill={color} />)}
      </svg>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: C.mutedDim, marginTop: 4 }}>
        <span>{data.length} tréningov · max {max}, min {min}</span>
        <span style={{ color: trendColor }}>{trendSym} {Math.abs(diff).toFixed(1)}</span>
      </div>
    </div>
  );
}

function ProgressScreen({ onBack, sessions }) {
  const stats = useMemo(() => {
    const trackedIds = ALL_EXERCISES.filter(e => e.tracked).map(e => e.id);
    return trackedIds.map(exId => {
      const ex = findExercise(exId);
      // Each session: collect sets for this exercise
      const points = [];
      [...sessions].reverse().forEach(s => {
        const sets = s.sets.filter(set => set.exerciseId === exId);
        if (!sets.length) return;
        const top = Math.max(...sets.map(set => Number(set.weight) || 0));
        const vol = sets.reduce((sum, set) => sum + (Number(set.weight) || 0) * (Number(set.reps) || 0), 0);
        points.push({ date: s.date, top, vol, notes: sets[0]?.notes || '' });
      });
      if (!points.length) return null;
      const seriesTop = points.filter(p => p.top > 0).map(p => ({ date: p.date, value: p.top }));
      const seriesVol = points.filter(p => p.vol > 0).map(p => ({ date: p.date, value: Math.round(p.vol) }));
      let signal = 'flat';
      if (seriesTop.length >= 3) {
        const last = seriesTop[seriesTop.length - 1].value;
        const prev2 = seriesTop.slice(-3, -1);
        const prevAvg = prev2.reduce((s, p) => s + p.value, 0) / prev2.length;
        if (last > prevAvg * 1.02) signal = 'up'; else if (last < prevAvg * 0.98) signal = 'down';
      } else if (seriesTop.length === 2) {
        if (seriesTop[1].value > seriesTop[0].value) signal = 'up';
        else if (seriesTop[1].value < seriesTop[0].value) signal = 'down';
      }
      return { exercise: ex, count: points.length, seriesTop, seriesVol, signal, latest: points[points.length - 1] };
    }).filter(Boolean);
  }, [sessions]);

  const upTrend = stats.filter(s => s.signal === 'up');
  const downTrend = stats.filter(s => s.signal === 'down');
  const [expandedId, setExpandedId] = useState(null);

  if (!sessions.length) {
    return (
      <div style={{ padding: '20px 20px 100px' }}>
        <Header onBack={onBack} subtitle="Progres" title="Analýza & grafy" />
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 20, color: C.muted, fontSize: 14, lineHeight: 1.6 }}>
          Po prvom odcvičenom tréningu tu uvidíš trendy.
        </div>
      </div>
    );
  }

  return (
    <div style={{ padding: '20px 20px 100px' }}>
      <Header onBack={onBack} subtitle="Progres" title="Analýza & grafy" />

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 20 }}>
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14 }}>
          <div style={{ fontSize: 11, color: C.mutedDim, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>Tréningov</div>
          <div style={{ fontSize: 26, fontFamily: C.serif }}>{sessions.length}</div>
        </div>
        <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14 }}>
          <div style={{ fontSize: 11, color: C.mutedDim, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>Cvikov v hre</div>
          <div style={{ fontSize: 26, fontFamily: C.serif }}>{stats.length}</div>
        </div>
      </div>

      {(upTrend.length > 0 || downTrend.length > 0) && (
        <div style={{ marginBottom: 24 }}>
          {upTrend.length > 0 && (
            <div style={{ background: C.successBg, border: `1px solid ${C.successBorder}`, borderRadius: 12, padding: 14, marginBottom: 10 }}>
              <div style={{ fontSize: 11, color: C.success, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>↑ Ide hore ({upTrend.length})</div>
              <div style={{ fontSize: 13, color: C.textDim, lineHeight: 1.5 }}>{upTrend.map(s => s.exercise.name).join(', ')}</div>
            </div>
          )}
          {downTrend.length > 0 && (
            <div style={{ background: '#1a0a0a', border: '1px solid #3f1f1f', borderRadius: 12, padding: 14 }}>
              <div style={{ fontSize: 11, color: '#b85f5f', letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 6 }}>↓ Stagnuje alebo klesá ({downTrend.length})</div>
              <div style={{ fontSize: 13, color: C.textDim, lineHeight: 1.5 }}>{downTrend.map(s => s.exercise.name).join(', ')}</div>
              <div style={{ fontSize: 12, color: C.muted, marginTop: 8, fontStyle: 'italic' }}>Tu sa oplatí pozrieť — únava? technika? regenerácia?</div>
            </div>
          )}
        </div>
      )}

      <div style={{ fontSize: 11, color: C.mutedDim, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10 }}>Detail cvikov</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {stats.map(s => {
          const isOpen = expandedId === s.exercise.id;
          const trendColor = s.signal === 'up' ? C.success : s.signal === 'down' ? '#b85f5f' : C.muted;
          const trendSym = s.signal === 'up' ? '↑' : s.signal === 'down' ? '↓' : '→';
          const lastTop = s.seriesTop.length ? s.seriesTop[s.seriesTop.length - 1].value : 0;
          return (
            <div key={s.exercise.id} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, overflow: 'hidden' }}>
              <button onClick={() => setExpandedId(isOpen ? null : s.exercise.id)}
                style={{ width: '100%', background: 'transparent', border: 'none', padding: '14px 16px', textAlign: 'left', cursor: 'pointer', color: C.text }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 11, color: C.mutedDim, marginBottom: 3 }}>{s.exercise.id}</div>
                    <div style={{ fontSize: 14, fontWeight: 500, lineHeight: 1.3 }}>{s.exercise.name}</div>
                    <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{s.count}× · top {lastTop > 0 ? `${lastTop} kg` : '—'}</div>
                  </div>
                  <div style={{ color: trendColor, fontSize: 18, marginLeft: 10 }}>{trendSym}</div>
                </div>
              </button>
              {isOpen && (
                <div style={{ padding: '4px 16px 16px', borderTop: `1px solid ${C.border}` }}>
                  <div style={{ fontSize: 11, color: C.mutedDim, letterSpacing: '0.1em', textTransform: 'uppercase', margin: '12px 0 6px' }}>Top váha série</div>
                  <MiniChart data={s.seriesTop} color="#fff" />
                  <div style={{ fontSize: 11, color: C.mutedDim, letterSpacing: '0.1em', textTransform: 'uppercase', margin: '14px 0 6px' }}>Celkový objem (kg × reps)</div>
                  <MiniChart data={s.seriesVol} color="#888" />
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function HistoryScreen({ onBack, sessions }) {
  return (
    <div style={{ padding: '20px 20px 100px' }}>
      <Header onBack={onBack} subtitle="História" title={`${sessions.length} tréningov`} />
      {!sessions.length && <div style={{ color: C.muted, fontSize: 14 }}>Zatiaľ nič odcvičené.</div>}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {sessions.map((s, i) => {
          const exCount = new Set(s.sets.map(set => set.exerciseId)).size;
          return (
            <div key={i} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                <div>
                  <div style={{ fontSize: 11, color: C.mutedDim, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 3 }}>{s.training}</div>
                  <div style={{ fontSize: 15, fontWeight: 500 }}>{new Date(s.date).toLocaleDateString('sk-SK', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div>
                </div>
                <div style={{ fontSize: 11, color: C.muted, textAlign: 'right' }}>{exCount} cvikov<br/>{s.sets.length} sérií</div>
              </div>
              {s.notes && <div style={{ marginTop: 8, fontSize: 12, color: C.muted, fontStyle: 'italic' }}>"{s.notes}"</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SettingsScreen({ onBack, onRefresh, onResetUrl }) {
  return (
    <div style={{ padding: '20px 20px 100px' }}>
      <Header onBack={onBack} subtitle="Nastavenia" title="Konfigurácia" />
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16, marginBottom: 12 }}>
        <div style={{ fontSize: 13, color: C.textDim, marginBottom: 12, lineHeight: 1.5 }}>Endpoint: <code style={{ fontSize: 11, color: '#aaa', wordBreak: 'break-all' }}>{getEndpoint() || '—'}</code></div>
        <button onClick={onRefresh} style={{ width: '100%', background: '#1a1a1a', border: `1px solid ${C.borderStrong}`, borderRadius: 10, padding: '12px', color: C.text, cursor: 'pointer', fontSize: 14, marginBottom: 8 }}>Obnoviť dáta zo Sheetu</button>
        <button onClick={onResetUrl} style={{ width: '100%', background: 'transparent', border: '1px solid #3f1f1f', borderRadius: 10, padding: '12px', color: '#b85f5f', cursor: 'pointer', fontSize: 14 }}>Zmeniť endpoint URL</button>
      </div>
    </div>
  );
}

// =============================================================
// ROOT
// =============================================================
function App() {
  const [view, setView] = useState({ screen: 'home' });
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [syncing, setSyncing] = useState(false);
  const [hasEndpoint, setHasEndpoint] = useState(!!getEndpoint());

  const refresh = useCallback(async () => {
    if (!getEndpoint()) return;
    setLoading(true); setError('');
    try {
      const data = await apiReadHistory();
      setSessions(data.sessions || []);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => { if (hasEndpoint) refresh(); }, [hasEndpoint, refresh]);

  const handleSaveExercise = async (trainingId, trainingName, allEntries) => {
    setSyncing(true);

    // Build flat sets array
    const todayDate = new Date().toISOString().slice(0, 10);
    const todayStr = new Date().toDateString();
    const existing = sessions.find(s => s.training === trainingName && new Date(s.date).toDateString() === todayStr);
    const sessionId = existing?.sessionId || `SES-${Date.now()}`;

    const setsArr = [];
    Object.entries(allEntries).forEach(([exId, entry]) => {
      const ex = findExercise(exId);
      entry.sets.forEach((s, idx) => {
        setsArr.push({
          exerciseId: exId,
          exerciseName: ex?.name || '',
          setNum: idx + 1,
          weight: s.weight === '' ? null : Number(s.weight),
          reps: s.reps === '' ? null : Number(s.reps),
          notes: entry.notes || '',
        });
      });
    });

    const payload = {
      sessionId,
      date: todayDate,
      trainingId,
      trainingName,
      duration: null,
      notes: '',
      sets: setsArr,
    };

    try {
      await apiWriteSession(payload);
      // Update local state optimistically
      const newSession = {
        sessionId,
        date: new Date().toISOString(),
        training: trainingName,
        duration: null,
        notes: '',
        sets: setsArr,
      };
      setSessions(prev => {
        const filtered = prev.filter(s => s.sessionId !== sessionId);
        return [newSession, ...filtered].sort((a, b) => new Date(b.date) - new Date(a.date));
      });
    } catch (e) {
      setError('Ukladanie zlyhalo: ' + e.message);
    } finally {
      setSyncing(false);
    }
  };

  if (!hasEndpoint) {
    return (
      <div style={{ minHeight: '100vh', background: C.bg, color: C.text, maxWidth: 600, margin: '0 auto' }}>
        <SetupScreen onSaved={() => setHasEndpoint(true)} />
      </div>
    );
  }

  return (
    <div style={{ minHeight: '100vh', background: C.bg, color: C.text, maxWidth: 600, margin: '0 auto' }}>
      {view.screen === 'home' && <HomeScreen onNav={setView} sessions={sessions} loading={loading} error={error} onRefresh={refresh} />}
      {view.screen === 'training' && (
        <TrainingScreen trainingId={view.trainingId} onBack={() => setView({ screen: 'home' })}
          sessions={sessions} onSaveExercise={handleSaveExercise} syncing={syncing} />
      )}
      {view.screen === 'progress' && <ProgressScreen onBack={() => setView({ screen: 'home' })} sessions={sessions} />}
      {view.screen === 'history' && <HistoryScreen onBack={() => setView({ screen: 'home' })} sessions={sessions} />}
      {view.screen === 'settings' && (
        <SettingsScreen onBack={() => setView({ screen: 'home' })} onRefresh={refresh}
          onResetUrl={() => { localStorage.removeItem(URL_KEY); setHasEndpoint(false); }} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
